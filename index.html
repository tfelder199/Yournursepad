// Gumroad license verification
async function verifyGumroadKey(licenseKey) {
  try {
    const res = await fetch("https://api.gumroad.com/v2/licenses/verify", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: `product_id=iH3OVGaYo6ZmsiXFkruJsg==&license_key=${encodeURIComponent(licenseKey)}`
    });
    const data = await res.json();
    return data.success === true;
  } catch {
    // If verification fails due to network, do basic format check
    // Gumroad keys are typically 35 chars: XXXXXXXX-XXXXXXXX-XXXXXXXX-XXXXXXXX
    const clean = licenseKey.trim().toUpperCase();
    return clean.length >= 10;
  }
}

// ── Helpers ───────────────────────────────────────────────────
const pad = n => String(n).padStart(2,"0");
const TODAY = new Date();
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS_FULL = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

// ── UI Atoms ──────────────────────────────────────────────────

}
function SmBtn({ children, onClick, danger, soft, active }) {

}

function GradeRing({ pct, size=52 }) {
  const r=(size/2)-5, circ=2*Math.PI*r, fill=pct!==null&&!isNaN(pct)?Math.min(pct/100,1)*circ:0;
  return (
    <svg width={size} height={size} style={{flexShrink:0}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.bd} strokeWidth={5}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={gc(pct)} strokeWidth={5}
        strokeDasharray={`${fill} ${circ}`} strokeLinecap="round" transform={`rotate(-90 ${size/2} ${size/2})`}/>
      <text x={size/2} y={size/2+1} textAnchor="middle" dominantBaseline="middle" fontSize={12} fontWeight={800} fill={gc(pct)} fontFamily="inherit">{pct!==null&&!isNaN(pct)?gl(pct):"—"}</text>
      {pct!==null&&!isNaN(pct)&&<text x={size/2} y={size/2+13} textAnchor="middle" dominantBaseline="middle" fontSize={8} fill={gc(pct)} fontFamily="inherit">{pct.toFixed(0)}%</text>}
    </svg>
  );
}

// ── AI HELPERS ────────────────────────────────────────────────
async function callAI(messages, systemPrompt) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json", "x-api-key": API_KEY, "anthropic-version":"2023-06-01", "anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:1000,
      system: systemPrompt,
      messages,
    })
  });
  const data = await res.json();
  return data.content?.[0]?.text || "";
}

// API calls handled server-side via /api/scan

async function parseSyllabus(base64Image, mimeType) {
  // Call our Vercel backend function instead of Anthropic directly
  const res = await fetch("/api/scan", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ base64: base64Image, mimeType })
  });
  if (!res.ok) throw new Error("Server error: " + res.status);
  const data = await res.json();
  return data;
}

// ── UNLOCK ────────────────────────────────────────────────────
function Unlock({ onUnlock }) {
  const [code,setCode]=useState(""); const [err,setErr]=useState(false);
  const [checking, setChecking] = useState(false);
  async function tryIt() {
    const trimmed = code.trim();
    if(!trimmed) return;
    setChecking(true);
    const valid = await verifyGumroadKey(trimmed);
    setChecking(false);
    if(valid) onUnlock(trimmed);
    else { setErr(true); setTimeout(()=>setErr(false),2000); }
  }
  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(160deg,${T.bg},${T.lt})`,display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{width:"100%",maxWidth:380,textAlign:"center"}}>
        <div style={{fontSize:72,marginBottom:10}}>🩺</div>
        <div style={{fontFamily:"Georgia,serif",fontSize:30,fontWeight:700,color:T.p,marginBottom:4}}>NursePad</div>
        <div style={{fontSize:14,color:T.soft,marginBottom:32}}>The nursing student app that actually gets it 💕</div>
        <div style={{background:T.card,borderRadius:20,padding:28,boxShadow:`0 12px 40px ${T.p}22`}}>
          <div style={{fontSize:14,color:T.ink,marginBottom:14,fontWeight:600}}>Enter your unlock code</div>
          <input value={code} onChange={e=>{setCode(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&tryIt()}
            placeholder="Your Gumroad license key" style={{...IS(),textAlign:"center",fontSize:20,fontWeight:800,letterSpacing:"0.05em",marginBottom:12,border:`2px solid ${err?"#E53935":T.bd}`}}/>
          {err&&<div style={{color:"#E53935",fontSize:13,marginBottom:12,fontWeight:600}}>❌ Invalid code — check your purchase email</div>}
          <BigBtn onClick={tryIt} full disabled={checking}>
            {checking ? "Verifying..." : "Unlock My App ✨"}
          </BigBtn>
          <div style={{fontSize:12,color:T.soft,marginTop:16}}>No code? <a href="https://gumroad.com" target="_blank" style={{color:T.p,fontWeight:700}}>Get NursePad →</a></div>
        </div>
        <div style={{fontSize:11,color:T.soft,marginTop:20}}>One-time purchase · Works on any device · Your data stays private</div>
      </div>
    </div>
  );
}

// ── AI SETUP ──────────────────────────────────────────────────
function AISetup({ onDone }) {
  const [step,setStep] = useState("info"); // info | upload | scanning | result | manual
  const [name,setName] = useState("");
  const [emoji,setEmoji] = useState("🩺");
  const [themeId,setThemeId] = useState("pink");
  const [scanning,setScanning] = useState(false);
  const [result,setResult] = useState(null);
  const [error,setError] = useState("");
  const [manualSchool,setManualSchool] = useState("");
  const [manualProg,setManualProg] = useState("LPN");
  const [manualPass,setManualPass] = useState("77");
  const [manualCourse,setManualCourse] = useState("");
  const fileRef = useRef();
  const galleryRef = useRef();

  applyTheme(themeId);

  async function handleFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setStep("scanning");
    setScanning(true);
    setError("");
    try {
      // Only images work with Claude vision - convert PDF notice
      const isImage = file.type.startsWith("image/");
      const mimeType = isImage ? file.type : "image/jpeg";
      
      const base64 = await new Promise((res,rej)=>{
        const r=new FileReader();
        r.onload=()=>res(r.result.split(",")[1]);
        r.onerror=()=>rej(new Error("Could not read file"));
        r.readAsDataURL(file);
      });

      const parsed = await parseSyllabus(base64, mimeType);
      if (parsed && parsed.courses && parsed.courses.length > 0) { 
        setResult(parsed); 
        setStep("result"); 
      } else { 
        setError("AI couldn't find grading info in that image. Try a clearer photo of just the grading section, or enter manually."); 
        setStep("upload"); 
      }
    } catch(err) {
      console.error("Upload error:", err);
      setError("Upload failed: " + (err.message||"Unknown error") + ". Please try again or enter manually.");
      setStep("upload");
    }
    setScanning(false);
  }

  function finish(cfg) {
    onDone({ name, emoji, themeId, ...cfg });
  }

  function finishManual() {
    finish({
      school: manualSchool,
      program: manualProg,
      passingGrade: Number(manualPass)||77,
      courses:[{ id:"c1", name:manualCourse||`${manualProg} Foundations`, hours:300,
        categories:[
          {id:"k1",name:"Unit Exams",weight:60,pillar:"knowledge"},
          {id:"k2",name:"Final Exam",weight:30,pillar:"knowledge"},
          {id:"k3",name:"Homework/Quizzes",weight:10,pillar:"knowledge"},
          {id:"s1",name:"Skills/Clinical",weight:100,pillar:"skills"},
          {id:"p1",name:"Professional Skills",weight:100,pillar:"prof"},
        ]
      }],
      welcomeMessage: `Welcome! Your grade is split into Knowledge, Skills, and Professional Skills — you need ${manualPass||77}%+ in all three to stay in your program. NursePad will calculate your real grade automatically as you enter scores.`
    });
  }

  function finishFromResult() {
    const courses=(result.courses||[]).map((c,i)=>({
      ...c, id:`c${i+1}`,
      categories:(c.categories||[]).map((cat,j)=>({...cat, id:`cat${i}${j}`}))
    }));
    finish({
      school:result.school||"",
      program:result.program||"Nursing",
      passingGrade:result.passingGrade||77,
      courses,
      welcomeMessage:result.welcomeMessage||""
    });
  }

  return (
    <div style={{minHeight:"100vh",background:T.bg,padding:"24px 16px 48px"}}>
      <div style={{maxWidth:460,margin:"0 auto"}}>

        {/* Step: Name & Theme */}
        {step==="info"&&(
          <>
            <div style={{textAlign:"center",marginBottom:28}}>
              <div style={{fontSize:52,marginBottom:8}}>{emoji}</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:26,fontWeight:700,color:T.p}}>Welcome to NursePad!</div>
              <div style={{fontSize:14,color:T.soft,marginTop:4}}>Let's make it yours 💕</div>
            </div>
            <div style={{background:T.card,borderRadius:20,padding:24,border:`1px solid ${T.bd}`,marginBottom:16}}>
              <F label="Your first name">
                <Inp value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Jasmine" autoFocus/>
              </F>
              <F label="Pick your icon">
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {["🩺","💉","💊","🫀","🌸","⭐","🔥","💪","🦋","👩‍⚕️","🌺","💅"].map(em=>(
                    <button key={em} onClick={()=>setEmoji(em)} style={{fontSize:22,background:emoji===em?T.lt:"transparent",border:emoji===em?`2px solid ${T.p}`:"2px solid transparent",borderRadius:10,padding:"6px 9px",cursor:"pointer"}}>{em}</button>
                  ))}
                </div>
              </F>
            </div>
            <div style={{background:T.card,borderRadius:20,padding:24,border:`1px solid ${T.bd}`,marginBottom:20}}>
              <div style={{fontSize:13,fontWeight:800,color:T.ink,marginBottom:12}}>🎨 Pick your theme</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                {THEMES.map(t=>(
                  <div key={t.id} onClick={()=>{setThemeId(t.id);applyTheme(t.id);}} style={{borderRadius:12,overflow:"hidden",border:themeId===t.id?`3px solid ${t.p}`:`1.5px solid ${t.bd}`,cursor:"pointer"}}>
                    <div style={{height:22,background:`linear-gradient(90deg,${t.p},${t.am})`}}/>
                    <div style={{padding:"6px 10px",background:t.bg}}>
                      <div style={{fontSize:12,fontWeight:700,color:t.ink}}>{t.name}</div>
                      {themeId===t.id&&<div style={{fontSize:10,color:t.p,fontWeight:700}}>✓ Selected</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <BigBtn full onClick={()=>name.trim()&&setStep("upload")} disabled={!name.trim()}>
              Continue →
            </BigBtn>
          </>
        )}

        {/* Step: Upload syllabus */}
        {step==="upload"&&(
          <>
            <div style={{textAlign:"center",marginBottom:24}}>
              <div style={{fontSize:48,marginBottom:8}}>📄</div>
              <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,color:T.p}}>Scan Your Grading Info</div>
              <div style={{fontSize:14,color:T.soft,marginTop:4,lineHeight:1.6}}>Upload your syllabus, Master Plan of Instruction, or any document that shows how your grades are calculated — our AI will read it and set everything up for you!</div>
            </div>
            {error&&<div style={{background:"#FDDEDE",borderRadius:12,padding:"12px 16px",marginBottom:16,color:"#C62828",fontSize:13,fontWeight:600}}>⚠️ {error}</div>}

            {/* Hidden inputs — one for camera, one for file */}
            <input ref={fileRef} type="file" accept="image/*,application/pdf,.doc,.docx" capture="environment" style={{display:"none"}} onChange={handleFile}/>
            <input ref={galleryRef} type="file" accept="image/*,application/pdf,.doc,.docx" style={{display:"none"}} onChange={handleFile}/>

            <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
              <button onClick={()=>fileRef.current?.click()} style={{background:T.card,border:`2px dashed ${T.p}`,borderRadius:18,padding:"22px",textAlign:"center",cursor:"pointer",width:"100%"}}>
                <div style={{fontSize:36,marginBottom:6}}>📸</div>
                <div style={{fontWeight:800,fontSize:15,color:T.ink,marginBottom:2}}>Take a Photo</div>
                <div style={{fontSize:12,color:T.soft}}>Point your camera at the grading section</div>
              </button>
              <button onClick={()=>galleryRef.current?.click()} style={{background:T.card,border:`2px dashed ${T.bd}`,borderRadius:18,padding:"22px",textAlign:"center",cursor:"pointer",width:"100%"}}>
                <div style={{fontSize:36,marginBottom:6}}>🖼️</div>
                <div style={{fontWeight:800,fontSize:15,color:T.ink,marginBottom:2}}>Upload from Camera Roll or Files</div>
                <div style={{fontSize:12,color:T.soft}}>Photo, PDF, or document from your phone</div>
              </button>
            </div>

            <div style={{background:T.lt,borderRadius:14,padding:"12px 16px",marginBottom:20,fontSize:13,color:T.dk}}>
              💡 <strong>What to upload:</strong> The page that shows your grade breakdown — percentages, exam weights, passing grade, etc. This is usually in your syllabus or Master Plan of Instruction (MPI). Don't have one? No worries — you can enter it manually below.
            </div>
            <div style={{textAlign:"center"}}>
              <button onClick={()=>setStep("manual")} style={{background:"none",border:"none",color:T.soft,fontSize:13,cursor:"pointer",textDecoration:"underline"}}>Enter grading info manually instead</button>
            </div>
          </>
        )}

        {/* Step: Scanning */}
        {step==="scanning"&&(
          <div style={{textAlign:"center",padding:"60px 0"}}>
            <div style={{fontSize:56,marginBottom:16}}>🤖</div>
            <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,color:T.p,marginBottom:8}}>Reading your syllabus...</div>
            <div style={{fontSize:14,color:T.soft,marginBottom:24}}>Our AI is extracting your grading structure</div>
            <div style={{display:"flex",justifyContent:"center",gap:6}}>
              {[0,1,2].map(i=>(
                <div key={i} style={{width:10,height:10,borderRadius:"50%",background:T.p,animation:`bounce${i} .8s ease-in-out infinite`,animationDelay:`${i*.15}s`}}/>
              ))}
            </div>
            <style>{`
              @keyframes bounce0,@keyframes bounce1,@keyframes bounce2{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
              div[style*="bounce0"]{animation:bounce0 .8s ease-in-out infinite}

function calcGrades(grades, categories) {
  // Group by pillar, respecting weights within knowledge
  const knowledgeCats = (categories||[]).filter(c=>c.pillar==="knowledge");
  const skillsCats    = (categories||[]).filter(c=>c.pillar==="skills");
  const profCats      = (categories||[]).filter(c=>c.pillar==="prof");

  function weightedAvg(cats, grades) {
    let ws=0, wt=0;
    for (const cat of cats) {
      const cg = grades.filter(g=>g.catId===cat.id);
      if (!cg.length) continue;
      const avg = cg.reduce((s,g)=>s+g.pct,0)/cg.length;
      const w = cat.weight||1;
      ws += avg*w; wt += w;
    }
    return wt ? ws/wt : null;
  }

  const k = weightedAvg(knowledgeCats, grades);
  const s = weightedAvg(skillsCats.length?skillsCats:[{id:"skills",weight:1}], grades.filter(g=>g.pillar==="skills"));
  const p = weightedAvg(profCats.length?profCats:[{id:"prof",weight:1}], grades.filter(g=>g.pillar==="prof"));
  let overall=null,cnt=0;
  if(k!==null){overall=(overall||0)+k;cnt++;} if(s!==null){overall=(overall||0)+s;cnt++;} if(p!==null){overall=(overall||0)+p;cnt++;}
  return { k, s, p, overall:cnt?overall/cnt:null };
}

          const grades=getGrades(course.id);

          const isOpen=open===course.id;
          const fail=[(k!==null&&k<(pass||77))?"Knowledge":null,(s!==null&&s<(pass||77))?"Skills":null,(p!==null&&p<(pass||77))?"Prof":null].filter(Boolean);

function TasksView({ tasks, setTasks }) {

  const [form,setForm]=useState({title:"",due:"",priority:"medium",notes:""});
  const tk=dateKey(TODAY);
  function open(t){setEdit(t||null);setForm(t?{...t}:{title:"",due:"",priority:"medium",notes:""});setSheet(true);}
  function saveTask(){if(!form.title.trim())return;if(edit)setTasks(ts=>ts.map(t=>t.id===edit.id?{...form,id:t.id}:t));else setTasks(ts=>[...ts,{...form,id:Date.now(),done:false}]);setSheet(false);}
  function tog(id){setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));}
  function del(id){setTasks(ts=>ts.filter(t=>t.id!==id));}
  const overdue=tasks.filter(t=>!t.done&&t.due&&t.due<tk);
  const shown=tasks.filter(t=>filter==="done"?t.done:!t.done).sort((a,b)=>({high:0,medium:1,low:2}[a.priority]||1)-({high:0,medium:1,low:2}[b.priority]||1));

        {[["pending","To Do"],["done","Done"]].map(([f,l])=>(
          <button key={f} onClick={()=>setFilter(f)} style={{background:filter===f?T.p:"transparent",color:filter===f?"#fff":T.soft,border:`2px solid ${filter===f?T.p:T.bd}`,borderRadius:20,padding:"6px 20px",fontWeight:700,fontSize:13,cursor:"pointer",flex:1}}>{l} ({tasks.filter(t=>f==="done"?t.done:!t.done).length})</button>
        ))}

      {shown.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:T.soft}}><div style={{fontSize:36,marginBottom:8}}>{filter==="done"?"🎉":"✨"}</div><div style={{fontWeight:600,fontSize:15}}>{filter==="done"?"Nothing yet":"All caught up!"}</div></div>}
      <div style={{display:"flex",flexDirection:"column",gap:8}}>

function SettingsView({ config, setConfig, themeId, setThemeId }) {
  const [form,setForm]=useState({...config});
  const [saved,setSaved]=useState(false);
  const [rescan,setRescan]=useState(false);
  const [scanning,setScanning]=useState(false);
  const fileRef=useRef();

  async function handleRescan(e) {
    const file=e.target.files?.[0]; if(!file) return;
    setScanning(true);
    try {
      const base64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej();r.readAsDataURL(file);});
      const result=await parseSyllabus(base64,file.type||"image/jpeg");
      if(result) {
        setForm(f=>({...f, school:result.school||f.school, program:result.program||f.program, passingGrade:result.passingGrade||f.passingGrade}));
        setConfig(f=>({...f, courses:(result.courses||[]).map((c,i)=>({...c,id:`c${i+1}`,categories:(c.categories||[]).map((cat,j)=>({...cat,id:`cat${i}${j}`}))})) }));
      }
    } catch {}
    setScanning(false); setRescan(false);
  }

  function saveAll(){setConfig({...form,themeId});setSaved(true);setTimeout(()=>setSaved(false),2000);}

  return(
    <div>
      <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,color:T.ink,marginBottom:20}}>My Profile</div>
      <div style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:16,padding:"20px",marginBottom:14}}>

        <F label="Icon">
          <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>

              <button key={em} onClick={()=>setForm(f=>({...f,emoji:em}))} style={{fontSize:20,background:form.emoji===em?T.lt:"transparent",border:form.emoji===em?`2px solid ${T.p}`:"2px solid transparent",borderRadius:9,padding:"5px 9px",cursor:"pointer"}}>{em}</button>
            ))}
          </div>
        </F>
        <F label="Motto"><Inp value={form.motto||""} onChange={e=>setForm(f=>({...f,motto:e.target.value}))} placeholder='e.g. "Future nurse — unstoppable!"'/></F>
      </div>
      <div style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:16,padding:"20px",marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:13,fontWeight:800,color:T.ink}}>🏫 School & Grading</div>
          <SmBtn soft onClick={()=>setRescan(true)}>📸 Re-scan Syllabus</SmBtn>
        </div>
        {scanning&&<div style={{textAlign:"center",padding:"16px 0",color:T.p,fontWeight:700}}>🤖 Reading syllabus...</div>}
        <F label="School"><Inp value={form.school||""} onChange={e=>setForm(f=>({...f,school:e.target.value}))} placeholder="School name"/></F>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          <F label="Program"><select value={form.program||"LPN"} onChange={e=>setForm(f=>({...f,program:e.target.value}))} style={IS()}>{["LPN","RN","CNA","ADN","BSN","MA","Other"].map(p=><option key={p}>{p}</option>)}</select></F>
          <F label="Passing %"><input type="number" value={form.passingGrade||77} onChange={e=>setForm(f=>({...f,passingGrade:Number(e.target.value)}))} style={IS()}/></F>
        </div>
        {rescan&&<><input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={handleRescan}/><BigBtn outline onClick={()=>fileRef.current?.click()}>📸 Take Photo of Syllabus</BigBtn></>}
      </div>
      <div style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:16,padding:"20px",marginBottom:20}}>
        <div style={{fontSize:13,fontWeight:800,color:T.ink,marginBottom:12}}>🎨 Theme</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          {THEMES.map(t=>(
            <div key={t.id} onClick={()=>{setThemeId(t.id);applyTheme(t.id);}} style={{borderRadius:12,overflow:"hidden",border:themeId===t.id?`3px solid ${t.p}`:`1.5px solid ${t.bd}`,cursor:"pointer"}}>
              <div style={{height:20,background:`linear-gradient(90deg,${t.p},${t.am})`}}/>
              <div style={{padding:"6px 10px",background:t.bg}}><div style={{fontSize:12,fontWeight:700,color:t.ink}}>{t.name}</div>{themeId===t.id&&<div style={{fontSize:10,color:t.p,fontWeight:700}}>✓ Active</div>}</div>
            </div>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        <BigBtn full onClick={saveAll}>Save Changes</BigBtn>
        {saved&&<span style={{fontSize:14,color:T.p,fontWeight:800}}>Saved! 🎉</span>}
      </div>
    </div>
  );
}

// ── HOME ──────────────────────────────────────────────────────
function HomeView({ state, onNavigate }) {
  const { tasks=[],meds=[],modules=[],courses=[],gpa={},config={} } = state;
  const tk=dateKey(TODAY);
  const pass=config.passingGrade||77;
  const urgent=tasks.filter(t=>!t.done&&t.due&&t.due<=tk);
  const due7=tasks.filter(t=>!t.done&&t.due&&t.due>tk&&t.due<=dateKey(new Date(Date.now()+7*864e5)));
  const done=tasks.filter(t=>t.done).length;
  const activeMod=modules.find(m=>m.startDate&&m.endDate&&m.startDate<=tk&&m.endDate>=tk);

  const gradeData=(courses||[]).map(c=>{
    const grades=(gpa.grades||[]).filter(g=>g.courseId===c.id);
    const {overall}=calcGrades(grades,c.categories);
    return{...c,grades,overall};
  }).filter(c=>c.grades.length>0);

  return(
    <div>
      {/* Hero */}
      <div style={{background:`linear-gradient(135deg,${T.p},${T.dk})`,borderRadius:20,padding:"22px",marginBottom:18,color:"#fff"}}>
        <div style={{fontSize:11,opacity:.75,marginBottom:2,textTransform:"uppercase",letterSpacing:"0.12em"}}>{DAYS[TODAY.getDay()]} · {MONTHS_FULL[TODAY.getMonth()]} {TODAY.getDate()}, {TODAY.getFullYear()}</div>
        <div style={{fontFamily:"Georgia,serif",fontSize:22,fontWeight:700,marginBottom:config.motto?4:8}}>
          {config.name?`Hey Nurse ${config.name} ${config.emoji||"💕"}`:"Hey, future nurse! 💕"}
        </div>
        {config.motto&&<div style={{fontSize:13,opacity:.9,fontStyle:"italic",marginBottom:8}}>"{config.motto}"</div>}
        {activeMod
          ?<div style={{fontSize:12,background:"rgba(255,255,255,.2)",borderRadius:10,padding:"6px 12px",display:"inline-block"}}>📖 Studying: {activeMod.name.length>32?activeMod.name.slice(0,32)+"…":activeMod.name}</div>
          :<div style={{fontSize:12,opacity:.85}}>{urgent.length?`⚡ ${urgent.length} overdue task${urgent.length>1?"s":""}`:due7.length?`📅 ${due7.length} due this week`:"You're all caught up! ✨"}</div>
        }
        {config.school&&<div style={{fontSize:11,opacity:.6,marginTop:6}}>{config.school} · {config.program}</div>}
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
        {[
          {icon:"📋",val:tasks.filter(t=>!t.done).length,label:"To Do",tab:"tasks",color:T.p},
          {icon:"⚡",val:urgent.length,label:"Overdue",tab:"tasks",color:urgent.length?"#E53935":T.p},
          {icon:"📚",val:modules.length,label:"Modules",tab:"modules",color:T.am},
          {icon:"💊",val:meds.length,label:"Drugs",tab:"meds",color:T.dk},
        ].map(item=>(
          <div key={item.label} onClick={()=>onNavigate(item.tab)} style={{background:T.card,border:`1.5px solid ${T.bd}`,borderRadius:14,padding:"12px 6px",textAlign:"center",cursor:"pointer"}}>
            <div style={{fontSize:20,marginBottom:2}}>{item.icon}</div>
            <div style={{fontSize:22,fontWeight:800,color:item.color,fontFamily:"Georgia,serif",lineHeight:1}}>{item.val}</div>
            <div style={{fontSize:9,color:T.soft,textTransform:"uppercase",letterSpacing:"0.05em",marginTop:2}}>{item.label}</div>
          </div>
        ))}
      </div>

      {/* Task progress */}
      {tasks.length>0&&<div style={{background:T.card,border:`1px solid ${T.bd}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:700,fontSize:14,color:T.ink}}>Task progress</span><span style={{fontSize:13,color:T.soft}}>{done}/{tasks.length}</span></div>
        <div style={{background:T.bg,borderRadius:99,height:10,overflow:"hidden"}}><div style={{width:`${tasks.length?Math.round(done/tasks.length*100):0}%`,background:`linear-gradient(90deg,${T.p},${T.am})`,height:"100%",borderRadius:99,transition:"width .5s"}}/></div>
      </div>}

      {/* Grades */}
      {gradeData.length>0&&<div style={{background:T.lt,border:`1px solid ${T.bd}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:12,color:T.dk,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:10}}>🎓 Grade Summary</div>
        {gradeData.map(c=>(
          <div key={c.id||c.name} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:`1px solid ${T.bd}`}}>
            <GradeRing pct={c.overall} size={40}/>
            <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700,color:T.ink}}>{c.name}</div><div style={{fontSize:11,color:T.soft}}>{c.overall!==null?`${c.overall.toFixed(1)}% overall`:"No grades"}</div></div>
            <SmBtn soft onClick={()=>onNavigate("grades")}>Details →</SmBtn>
          </div>
        ))}
      </div>}

      {/* Overdue */}
      {urgent.length>0&&<div style={{background:"#FDDEDE",border:"1px solid #FFCDD2",borderRadius:14,padding:"14px 16px",marginBottom:12}}>
        <div style={{fontWeight:800,fontSize:12,color:"#C62828",textTransform:"uppercase",marginBottom:8}}>⚡ Overdue</div>
        {urgent.slice(0,3).map(t=><div key={t.id} style={{fontSize:13,color:"#C62828",padding:"2px 0",fontWeight:600}}>• {t.title}</div>)}
        {urgent.length>3&&<div style={{fontSize:12,color:"#C62828",marginTop:4,cursor:"pointer",textDecoration:"underline",fontWeight:700}} onClick={()=>onNavigate("tasks")}>+{urgent.length-3} more</div>}
      </div>}

      {/* This week */}
      {due7.length>0&&<div style={{background:T.aml,border:`1px solid ${T.am}44`,borderRadius:14,padding:"14px 16px"}}>
        <div style={{fontWeight:800,fontSize:12,color:T.am,textTransform:"uppercase",marginBottom:8}}>📅 This Week</div>
        {due7.slice(0,4).map(t=><div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:`1px solid ${T.am}22`}}><span style={{fontSize:13,color:T.ink}}>{t.title}</span><span style={{fontSize:11,color:T.soft}}>{t.due}</span></div>)}
      </div>}
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────
const TABS=[{id:"home",icon:"🏠",label:"Home"},{id:"grades",icon:"🎓",label:"Grades"},{id:"tasks",icon:"📋",label:"Tasks"},{id:"meds",icon:"💊",label:"Drugs"},{id:"modules",icon:"📚",label:"Modules"},{id:"vitals",icon:"🩺",label:"Vitals"},{id:"settings",icon:"⚙️",label:"Me"}];

function App() {
  const [state,setState]=useState(()=>load());
  const [tab,setTab]=useState("home");
  const [,tick]=useState(0);

  useEffect(()=>{save(state);},[state]);

  const set=useCallback(key=>fn=>setState(s=>({...s,[key]:typeof fn==="function"?fn(s[key]||[]):fn})),[]);
  const setConfig=useCallback(v=>setState(s=>({...s,config:typeof v==="function"?v(s.config||{}):v})),[]);
  const setThemeId=useCallback(id=>{setState(s=>({...s,config:{...(s.config||{}),themeId:id}}));applyTheme(id);tick(n=>n+1);},[]);
  const setCourses=useCallback(v=>setState(s=>({...s,courses:typeof v==="function"?v(s.courses||[]):v})),[]);
  const setGpa=useCallback(v=>setState(s=>({...s,gpa:typeof v==="function"?v(s.gpa||{}):v})),[]);

  applyTheme(state.config?.themeId||"pink");

  if(!state.unlocked) return <Unlock onUnlock={code=>setState(s=>({...s,unlocked:true,code}))}/>;

  if(!state.setup) return <AISetup onDone={cfg=>{
    setState(s=>({...s,setup:true,config:cfg,courses:cfg.courses||[]}));
    applyTheme(cfg.themeId||"pink");
  }}/>;

  const config=state.config||{};
  applyTheme(config.themeId||"pink");

  const fullState={tasks:state.tasks||[],meds:state.meds||[],modules:state.modules||[],courses:state.courses||[],gpa:state.gpa||{},config};

  return(
    <div style={{fontFamily:"-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif",background:T.bg,minHeight:"100vh",maxWidth:700,margin:"0 auto"}}>
      <div style={{background:T.card,borderBottom:`1px solid ${T.bd}`,padding:"12px 18px",display:"flex",alignItems:"center",gap:12,position:"sticky",top:0,zIndex:10}}>
        <div style={{width:36,height:36,borderRadius:10,background:`linear-gradient(135deg,${T.p},${T.dk})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:19}}>{config.emoji||"🩺"}</div>
        <div style={{flex:1}}>
          <div style={{fontFamily:"Georgia,serif",fontSize:17,fontWeight:700,color:T.ink,lineHeight:1}}>{config.name?`Nurse ${config.name}'s NursePad`:"NursePad"}</div>
          <div style={{fontSize:9,color:T.soft,letterSpacing:"0.08em",marginTop:1}}>{config.school||"NURSING STUDENT"} · {config.program||"NURSING"}</div>
        </div>
      </div>
      <div style={{padding:"18px 14px 110px"}}>
        {tab==="home"     &&<HomeView state={fullState} onNavigate={setTab}/>}
        {tab==="grades"   &&<GradesView courses={state.courses||[]} setCourses={setCourses} gpa={state.gpa||{}} setGpa={setGpa} pass={config.passingGrade||77}/>}
        {tab==="tasks"    &&<TasksView tasks={state.tasks||[]} setTasks={set("tasks")}/>}
        {tab==="meds"     &&<DrugView meds={state.meds||[]} setMeds={set("meds")}/>}
        {tab==="modules"  &&<ModulesView modules={state.modules||[]} setModules={set("modules")}/>}
        {tab==="vitals"   &&<VitalsView/>}
        {tab==="settings" &&<SettingsView config={config} setConfig={setConfig} themeId={config.themeId||"pink"} setThemeId={setThemeId}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:700,background:T.card,borderTop:`1px solid ${T.bd}`,display:"flex"}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{background:"none",border:"none",cursor:"pointer",padding:"8px 0 12px",display:"flex",flexDirection:"column",alignItems:"center",gap:2,flex:1}}>
            <span style={{fontSize:18}}>{t.icon}</span>
            <span style={{fontSize:8,fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase",color:tab===t.id?T.p:T.soft,lineHeight:1}}>{t.label}</span>
            {tab===t.id&&<span style={{width:20,height:3,borderRadius:99,background:T.p}}/>}
          </button>
        ))}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
